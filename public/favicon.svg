<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bar 1 (Foundation) -->
  <rect x="10" y="40" width="10" height="14" rx="3" fill="url(#barGradient1)" />
  
  <!-- Bar 2 (Progression) -->
  <rect x="25" y="28" width="10" height="26" rx="3" fill="url(#barGradient2)" />
  
  <!-- Bar 3 (The Path to the Goal) -->
  <rect x="40" y="16" width="10" height="38" rx="3" fill="url(#barGradient3)" />
  
  <!-- The Goal Star (Positioned at the peak of the 3rd bar) -->
  <path d="M45 2L46.8541 7.1459L52 9L46.8541 10.8541L45 16L43.1459 10.8541L38 9L43.1459 7.1459L45 2Z" fill="#00FF9D" filter="url(#starGlow)" />
  
  <defs>
    <!-- Individual Gradients for depth -->
    <linearGradient id="barGradient1" x1="15" y1="40" x2="15" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#004D3C" />
      <stop offset="1" stop-color="#002B21" />
    </linearGradient>
    
    <linearGradient id="barGradient2" x1="30" y1="28" x2="30" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#006B54" />
      <stop offset="1" stop-color="#003D2F" />
    </linearGradient>
    
    <linearGradient id="barGradient3" x1="45" y1="16" x2="45" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00A383" />
      <stop offset="1" stop-color="#005C49" />
    </linearGradient>
    
    <!-- Premium Star Glow -->
    <filter id="starGlow" x="34" y="-2" width="22" height="22" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feFlood flood-color="#00FF9D" flood-opacity="0.5" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow" />
      <feMerge>
        <feMergeNode in="softGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
</svg>